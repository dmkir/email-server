## Dovecot configuration file

# Listening on IPv4
listen = *

# Protocols
protocols = imap

# TLS Configuration
ssl = required
ssl_cert = </etc/dovecot/certs/mail.crt
ssl_key = </etc/dovecot/certs/mail.key
ssl_min_protocol = TLSv1.2

# Mail location
mail_location = maildir:/var/mail/vmail/%d/%n

# Mail user
mail_uid = 1001
mail_gid = 1001
mail_privileged_group = vmail

# Authentication
disable_plaintext_auth = no

auth_mechanisms = plain login

userdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf.ext
}

passdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf.ext
}

# Service settings
service imap-login {
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

service auth {
  inet_listener {
    path = /run/dovecot/auth-postfix
    mode = 0660
    user = postfix
    group = postfix
  }
  unix_listener auth-userdb {
    mode = 0600
    user = vmail
    group = vmail
  }
}

# Logging
log_path = /var/log/dovecot.log
info_log_path = /var/log/dovecot-info.log

# IMAP
protocol imap {
  imap_max_line_length = 65536
}

# Namespaces
namespace inbox {
  inbox = yes
  special_use = \All
}
